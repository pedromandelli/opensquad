<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      position: relative;
      background: #060a0f;
    }

    /* Full-height photo background */
    .photo-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 40%, #0d1117 65%, #060a0f 100%);
      /* RUNTIME: background-image: url('{FOTO_PATH}'); background-size: cover; background-position: center; */
    }

    /* SAFE ZONE — all elements live here (1080 x 1350) */
    .safe-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1350px;
    }

    /* Decorative medical cross */
    .cross-bg {
      position: absolute;
      top: 160px;
      right: 48px;
      width: 240px;
      height: 240px;
      opacity: 0.07;
    }

    /* TOP LEFT — Logo */
    .logo-topleft {
      position: absolute;
      top: 64px;
      left: 64px;
    }

    .logo-topleft img {
      height: 44px;
      width: auto;
    }

    /* Horizontal rule */
    .rule {
      position: absolute;
      top: 136px;
      left: 64px;
      right: 64px;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    /* Left accent border */
    .accent-border {
      position: absolute;
      left: 0;
      top: 580px;
      width: 4px;
      height: 260px;
      background: rgba(255,255,255,0.22);
      border-radius: 2px;
    }

    /* MAIN CONTENT — vertically centered within safe zone */
    .content {
      position: absolute;
      left: 72px;
      right: 80px;
      top: 580px;
    }

    .title {
      font-size: 112px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 44px;
    }

    .subtitle {
      font-size: 30px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1.75;
    }

    .subtitle .highlight {
      font-weight: 900;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="photo-bg"></div>

  <div class="safe-zone">
    <!-- Decorative cross -->
    <svg class="cross-bg" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="88" y="0" width="64" height="240" rx="8" fill="white"/>
      <rect x="0" y="88" width="240" height="64" rx="8" fill="white"/>
    </svg>

    <!-- Logo top-left -->
    <div class="logo-topleft">
      <img src="logo.png" alt="VascularCare">
    </div>

    <!-- Rule -->
    <div class="rule"></div>

    <!-- Left accent border -->
    <div class="accent-border"></div>

    <!-- Main content -->
    <div class="content">
      <div class="title">
        Cuidado não<br>
        são apenas<br>
        vasinhos!
      </div>
      <div class="subtitle">
        O QUE VOCÊ VÊ NEM SEMPRE<br>
        É O <span class="highlight">PROBLEMA PRINCIPAL.</span>
      </div>
    </div>
  </div>
</body>
</html>
